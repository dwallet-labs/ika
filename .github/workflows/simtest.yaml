name: Simtest

# Manually triggered. Simtest runs deterministic single-threaded msim tests
# with real (sequential) class-groups crypto, so wall time is long — running
# on every PR is not worth it. Use this when you want to validate the simtest
# stack against a branch.
#
# See the "## Simtest" section in CLAUDE.md for background on the msim
# patches, IP allocation, pubfile handling, and the rayon × msim
# incompatibility.

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Cargo package to test"
        type: string
        required: false
        default: "ika-test-cluster"
      test_filter:
        description: "Test name filter passed to nextest"
        type: string
        required: false
        default: "test_swarm_reaches_epoch_2"
      seed:
        description: "MSIM_TEST_SEED"
        type: string
        required: false
        default: "1"
      test_num:
        description: "MSIM_TEST_NUM (number of seeds to iterate, starting from seed)"
        type: string
        required: false
        default: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: 1
  # Panic backtraces stay on, but eager std::backtrace::Backtrace::capture()
  # calls are disabled: class-groups constructs backtrace-carrying errors on
  # the SUCCESS path of every group operation, and with library backtraces
  # enabled each one is a full DWARF unwind behind a process-global std
  # mutex - measured at ~5x CPU burn and negative multi-thread scaling on
  # the class-groups-heavy tests (see specs and the 2026-06-11 CI slowness
  # investigation).
  RUST_LIB_BACKTRACE: "0"
  RUST_LOG: error
  # The simtest watchdog treats CPU-bound class-groups operations as
  # deadlocks (simulated time stops advancing while a rayon worker
  # crunches). Disable so the test isn't killed mid-crypto.
  MSIM_DISABLE_WATCHDOG: "1"
  rust_stable: "1.94"

jobs:
  simtest:
    name: cargo simtest
    runs-on: ubuntu-latest
    # Generous timeout: sequential class-groups crypto is slow under msim
    # (no `parallel` feature — see CLAUDE.md).
    timeout-minutes: 240
    steps:
      - name: Clean runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          deploy-key: ${{ secrets.GH_DEPLOY_KEY }}

      - name: Install Rust ${{ env.rust_stable }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_stable }}

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang pkg-config libssl-dev

      - uses: Swatinem/rust-cache@v2
        with:
          # Simtest builds use the `simulator` cargo profile and `--cfg msim`,
          # so the artifacts don't overlap with the normal CI cache.
          prefix-key: "simtest"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install cargo-simtest shim
        run: ./scripts/simtest/install.sh

      - name: Run simtest
        env:
          MSIM_TEST_SEED: ${{ inputs.seed }}
          MSIM_TEST_NUM: ${{ inputs.test_num }}
        run: |
          cargo simtest --package ${{ inputs.package }} -- ${{ inputs.test_filter }}
