name: TS Integration Tests

# Manually triggered. Runs the full TypeScript SDK integration suite against
# a REAL local network — a Sui localnet plus an ika localnet (`ika start`) —
# on the `ika-k8s-large` self-hosted runner.
#
# All test files run in dependency order (foundational first) against ONE
# Sui + ika localnet via `run-integration-tests-sequential.sh`.
#
# The localnet readiness probe is strict: the network-key DKG must have
# cached its outputs (the overlay-missing warnings appeared AND went quiet)
# and the mpc_data freeze must have fired, sampled over three consecutive
# checks. A looser probe starts the tests against a still-converging (or
# genesis-wedged) network and every test times out with "Object does not
# exist".

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Single test file to run (empty = full suite)"
        type: string
        required: false
        default: ""
      epoch_duration_ms:
        description: "ika localnet epoch duration in ms"
        type: string
        required: false
        default: "300000"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  GH_DEPLOY_KEY: ${{ secrets.GH_DEPLOY_KEY }}
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: 1
  rust_stable: "1.94"

jobs:
  ts-integration:
    name: TS integration suite
    runs-on: ika-k8s-large
    # Full suite is 9 files x 5-40 min each on one localnet, plus the
    # release build on a cold cache.
    timeout-minutes: 360
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          deploy-key: ${{ secrets.GH_DEPLOY_KEY }}

      - name: Install Rust ${{ env.rust_stable }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_stable }}

      - name: Install build dependencies
        run: |
          # Some runner pods lack IPv6 egress while DNS returns AAAA records,
          # so force IPv4 and retry — apt mirror flakiness otherwise fails the
          # whole job before any test runs.
          if command -v sudo >/dev/null; then SUDO=sudo; else SUDO=; fi
          APT="-o Acquire::ForceIPv4=true"
          for attempt in 1 2 3; do
            $SUDO apt-get $APT update && \
              $SUDO apt-get $APT install -y cmake clang pkg-config libssl-dev curl && break
            echo "apt attempt $attempt failed; retrying in 15s" && sleep 15
          done
          command -v cmake >/dev/null || { echo "build dependencies missing after retries"; exit 1; }

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "ts-integration"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"

      # `pnpm install` runs the ika-wasm package's `prepare` script, which
      # builds the Rust->WASM bindings with wasm-pack.
      - name: Install wasm pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      # The Cargo workspace pins Sui to mainnet-v1.70.2; a mismatched local
      # sui completes DKG but stalls reconfiguration, so pin the binary too.
      - name: Install Sui mainnet-v1.70.2
        run: |
          curl -L https://github.com/MystenLabs/sui/releases/download/mainnet-v1.70.2/sui-mainnet-v1.70.2-ubuntu-x86_64.tgz > sui.tgz
          tar -xzf sui.tgz
          mkdir -p "$HOME/.local/bin"
          cp ./sui "$HOME/.local/bin/sui"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build ika binary
        run: cargo build --release --bin ika

      - name: Install SDK dependencies
        run: pnpm install
        working-directory: ./sdk/typescript

      # `ika start` does NOT spawn Sui itself — it expects a localnet at
      # 127.0.0.1:9000 (and the tests use the faucet at 127.0.0.1:9123).
      - name: Start Sui localnet
        run: |
          RUST_LOG=error sui start --with-faucet --force-regenesis > sui-localnet.log 2>&1 &
          echo $! > sui-localnet.pid
          for i in $(seq 1 60); do
            if ! kill -0 "$(cat sui-localnet.pid)" 2>/dev/null; then
              echo "sui process died"; tail -40 sui-localnet.log; exit 1
            fi
            if curl -s -X POST http://127.0.0.1:9000 -H 'Content-Type: application/json' \
                 -d '{"jsonrpc":"2.0","id":1,"method":"rpc.discover","params":[]}' >/dev/null 2>&1 \
               && curl -s http://127.0.0.1:9123 >/dev/null 2>&1; then
              echo "sui localnet + faucet up after $((i*5))s"; exit 0
            fi
            sleep 5
          done
          echo "sui localnet not reachable after 5 minutes"; tail -40 sui-localnet.log; exit 1

      - name: Start ika localnet
        env:
          EPOCH_DURATION_MS: ${{ inputs.epoch_duration_ms }}
        run: |
          case "$EPOCH_DURATION_MS" in
            ''|*[!0-9]*) echo "epoch_duration_ms must be numeric"; exit 1 ;;
          esac
          rm -rf ~/.ika Pub.localnet.toml
          RUST_LOG=warn,ika=info,ika_node=info RUST_MIN_STACK=67108864 \
            ./target/release/ika start --force-reinitiation \
            --epoch-duration-ms "$EPOCH_DURATION_MS" > ika-localnet.log 2>&1 &
          echo $! > ika-localnet.pid

      - name: Wait for ika localnet readiness
        run: |
          # Strict probe: network-key DKG outputs cached (overlay-missing
          # warnings appeared AND went quiet) AND the mpc_data freeze fired,
          # stable across 3 consecutive 20s checks. Cap at 40 minutes — the
          # genesis network-key DKG is class-groups-heavy and takes ~20 min
          # on a cold runner pod (~6 min on a fast workstation).
          quiet=0
          for i in $(seq 1 120); do
            sleep 20
            if ! kill -0 "$(cat ika-localnet.pid)" 2>/dev/null; then
              echo "ika localnet process died"; tail -50 ika-localnet.log; exit 1
            fi
            total=$(grep -c "overlay missing a required output" ika-localnet.log || true)
            recent=$(tail -200 ika-localnet.log | grep -c "overlay missing a required output" || true)
            froze=$(grep -c "freezing attestation-validated mpc_data" ika-localnet.log || true)
            if [ "${total:-0}" -gt 0 ] && [ "${recent:-0}" -eq 0 ] && [ "${froze:-0}" -gt 0 ]; then
              quiet=$((quiet+1))
            else
              quiet=0
            fi
            if [ "$quiet" -ge 3 ]; then
              echo "ika localnet ready after $((i*20))s"; exit 0
            fi
          done
          echo "ika localnet NOT ready after 40 minutes — likely a genesis DKG wedge"
          tail -80 ika-localnet.log
          exit 1

      - name: Run integration tests
        working-directory: ./sdk/typescript
        env:
          TEST_FILTER: ${{ inputs.test_filter }}
        run: |
          if [ -n "$TEST_FILTER" ]; then
            ./scripts/run-integration-tests-sequential.sh --timeout 900 --filter "$TEST_FILTER"
          else
            ./scripts/run-integration-tests-sequential.sh --timeout 900
          fi

      - name: ika localnet health summary
        if: always()
        run: |
          echo "highest epoch: $(grep -oE 'run_epoch epoch=[0-9]+' ika-localnet.log | grep -oE '[0-9]+' | sort -un | tail -1)"
          echo "freeze counts: $(grep 'freezing attestation-validated' ika-localnet.log | grep -oE 'frozen=[0-9]+' | sort | uniq -c | tr '\n' ' ')"
          echo "sign failures: $(grep -cE 'FailedToAdvanceMPC|InvalidParameters' ika-localnet.log || true)"
          echo "panics: $(grep -ci panicked ika-localnet.log || true)"
          kill "$(cat ika-localnet.pid)" 2>/dev/null || true
          kill "$(cat sui-localnet.pid)" 2>/dev/null || true

      - name: Upload localnet logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: localnet-logs
          path: |
            ika-localnet.log
            sui-localnet.log
          retention-days: 7
